<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torn - City Event Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --frame: #1a1a1a;
      --panel: rgba(34, 34, 34, 0.95);
      --panel-border: #484848;
      --text: #f3f3f3;
      --muted: #adadad;
      --shadow: 0 12px 26px rgba(0, 0, 0, 0.6);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 10%, #161616 0%, #070707 70%);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 12px;
    }

    #app {
      position: relative;
      width: min(1250px, 100vw - 20px);
      height: min(860px, 100vh - 20px);
      border: 1px solid #2d2d2d;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: #111;
    }

    .map-shell {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 46px 1fr 102px;
      background: #111;
    }

    .map-topbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: linear-gradient(#515151, #2e2e2e);
      border-bottom: 1px solid #5b5b5b;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: .06em;
      font-size: 1.45rem;
    }

    .top-tab {
      display: grid;
      place-items: center;
      border-right: 1px solid #5b5b5b;
    }

    .top-tab:last-child { border-right: 0; }

    .map-stage {
      position: relative;
      overflow: hidden;
      background: #181818;
      border-bottom: 1px solid #2f2f2f;
    }

    #cityCanvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }

    #eventLayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .hud {
      position: absolute;
      top: 10px;
      left: 10px;
      display: grid;
      gap: 8px;
      z-index: 20;
      max-width: calc(100% - 90px);
    }

    .panel {
      background: rgba(20, 24, 20, 0.7);
      border: 1px solid rgba(210, 220, 200, 0.17);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 8px 10px;
    }

    .title {
      margin: 0;
      line-height: 1;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.45rem;
      letter-spacing: 0.08em;
    }

    .subtitle { color: var(--muted); font-size: 0.72rem; letter-spacing: 0.05em; margin-top: 4px; }

    .hud-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(86px, 1fr));
      gap: 6px;
      margin-top: 7px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 6px;
      min-width: 86px;
    }

    .stat b {
      display: block;
      font-size: 0.62rem;
      color: #b4b4b4;
      margin-bottom: 1px;
    }

    .stat span { font-size: 0.86rem; }

    .mini-wrap {
      position: absolute;
      left: 10px;
      bottom: 10px;
      width: 210px;
      z-index: 20;
    }

    #miniMap {
      width: 100%;
      height: 120px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(0, 0, 0, 0.55);
    }

    .map-tools {
      position: absolute;
      right: 10px;
      top: 12px;
      z-index: 22;
      display: grid;
      gap: 8px;
    }

    .tool-btn {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #3c3c3c, #161616);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: .9rem;
      cursor: pointer;
    }

    .event-chip {
      position: absolute;
      z-index: 15;
      transform: translate(-50%, -100%);
      color: #f4f1e5;
      font-size: 0.62rem;
      text-align: center;
      min-width: 44px;
      padding: 3px 5px;
      border-radius: 14px 14px 14px 4px;
      background: linear-gradient(#d9b06a, #8f6d3b);
      border: 1px solid rgba(0, 0, 0, 0.42);
      box-shadow: 0 2px 7px rgba(0,0,0,.38);
      animation: pulse 1.8s infinite;
      cursor: pointer;
      user-select: none;
      pointer-events: auto;
      font-weight: 600;
    }

    .event-chip::after {
      content: '';
      position: absolute;
      left: 12px;
      bottom: -9px;
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 9px solid #cc8f1d;
    }

    .event-chip.medium { background: linear-gradient(#88b7a5, #4f7d6c); }
    .event-chip.medium::after { border-top-color: #4f7d6c; }
    .event-chip.high { background: linear-gradient(#c7a37b, #8a6442); }
    .event-chip.high::after { border-top-color: #8a6442; }
    .event-chip.very-high { background: linear-gradient(#c88a86, #8f4f4c); }
    .event-chip.very-high::after { border-top-color: #8f4f4c; }

    @keyframes pulse {
      0% { transform: translate(-50%, -100%) scale(1); }
      50% { transform: translate(-50%, -101%) scale(1.04); }
      100% { transform: translate(-50%, -100%) scale(1); }
    }

    .symbol-key {
      background: linear-gradient(#3a3a3a, #262626);
      border-top: 1px solid #5a5a5a;
      padding: 8px 10px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
    }

    .symbol-key h3 {
      margin: 0;
      font-size: 1.6rem;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: .06em;
      color: #e8e8e8;
    }

    .symbol-grid {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 6px;
      overflow: hidden;
      background: rgba(24, 24, 24, 0.84);
    }

    .symbol-grid li {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .92rem;
      padding: 8px 10px;
      border-right: 1px solid rgba(255,255,255,.11);
      border-bottom: 1px solid rgba(255,255,255,.11);
    }

    .symbol-grid li:nth-child(3n) { border-right: 0; }
    .symbol-grid li:nth-last-child(-n+3) { border-bottom: 0; }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50% 50% 50% 4px;
      transform: rotate(-45deg);
      border: 1px solid rgba(0,0,0,.3);
      display: inline-block;
      flex: 0 0 auto;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 40;
      background: rgba(3, 7, 14, 0.72);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .overlay.show { display: flex; }

    .modal {
      width: min(700px, 100%);
      background: linear-gradient(160deg, rgba(29, 29, 29, 0.97), rgba(10, 10, 10, 0.97));
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .modal h2 {
      margin: 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: .08em;
    }

    .modal .meta {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .actions { margin-top: 14px; display: flex; gap: 10px; justify-content: flex-end; }

    button {
      font: inherit;
      border: none;
      border-radius: 8px;
      padding: 9px 13px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: .03em;
    }

    .btn-primary { background: linear-gradient(120deg, #f3c854, #de8d2c); color: #1f1708; }
    .btn-ghost { background: rgba(255,255,255,.08); color: var(--text); border: 1px solid rgba(255,255,255,.15); }

    .action-screen {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      background:
        radial-gradient(70% 50% at 40% 20%, rgba(64, 89, 138, 0.36), rgba(0, 0, 0, 0)),
        radial-gradient(80% 60% at 80% 90%, rgba(105, 47, 47, 0.3), rgba(0, 0, 0, 0)),
        linear-gradient(180deg, #050505, #111);
      overflow: hidden;
    }

    .action-screen.show { display: block; }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(240, 199, 76, .82);
      animation: drift linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0); opacity: .8; }
      to { transform: translateY(-120vh); opacity: 0; }
    }

    .action-ui {
      position: relative;
      z-index: 3;
      max-width: 920px;
      margin: 24px auto;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .phase-text {
      min-height: 90px;
      font-size: 1.02rem;
      line-height: 1.5;
      border-left: 4px solid #e3ae43;
      padding-left: 12px;
      background: rgba(5, 5, 5, 0.5);
    }

    .progress {
      height: 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.15);
      overflow: hidden;
    }

    .progress > i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f0b847, #d35a40);
      transition: width .18s linear;
    }

    .result {
      display: grid;
      gap: 8px;
      font-size: 0.95rem;
      background: rgba(5, 5, 5, 0.5);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px;
      padding: 12px;
    }

    .status-lock {
      position: absolute;
      top: 12px;
      right: 58px;
      z-index: 30;
      background: rgba(199, 67, 67, 0.24);
      border: 1px solid rgba(255, 126, 126, 0.42);
      color: #ffdede;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: .7rem;
      letter-spacing: .06em;
      display: none;
    }

    .status-lock.show { display: block; }

    @media (max-width: 980px) {
      #app { height: calc(100vh - 12px); width: calc(100vw - 12px); }
      .hud-grid { grid-template-columns: repeat(2, minmax(94px, 1fr)); }
      .symbol-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .symbol-grid li:nth-child(2n) { border-right: 0; }
      .symbol-grid li:nth-last-child(-n+2) { border-bottom: 0; }
      .mini-wrap { width: 170px; }
      #miniMap { height: 96px; }
      .map-shell { grid-template-rows: 42px 1fr 126px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="map-shell">
      <div class="map-topbar">
        <div class="top-tab">Map</div>
        <div class="top-tab">Quick Links</div>
      </div>

      <div class="map-stage">
        <canvas id="cityCanvas"></canvas>
        <div id="eventLayer"></div>

        <div class="hud">
          <div class="panel">
            <h1 class="title" id="cityName">Cidade</h1>
            <div class="subtitle" id="cityMeta">COORD 0,0</div>
            <div class="hud-grid">
              <div class="stat"><b>HP</b><span id="hudHp">100</span></div>
              <div class="stat"><b>DINHEIRO</b><span id="hudMoney">$5000</span></div>
              <div class="stat"><b>XP</b><span id="hudXp">0</span></div>
              <div class="stat"><b>STATUS</b><span id="hudStatus">LIVRE</span></div>
            </div>
          </div>
        </div>

        <div class="mini-wrap panel">
          <canvas id="miniMap"></canvas>
        </div>

        <div class="map-tools">
          <button class="tool-btn" id="btnZoomIn" title="Zoom +">🔎</button>
          <button class="tool-btn" id="btnZoomOut" title="Zoom -">➖</button>
          <button class="tool-btn" title="Links">🔗</button>
          <button class="tool-btn" title="Camadas">🎨</button>
          <button class="tool-btn" title="Mira">◎</button>
        </div>

        <div class="status-lock" id="statusLock">EM OPERAÇÃO · MAPA BLOQUEADO</div>
      </div>

      <div class="symbol-key">
        <h3>Key of Symbols</h3>
        <ul class="symbol-grid" id="legendList"></ul>
      </div>
    </div>

    <div class="overlay" id="eventModalOverlay">
      <div class="modal">
        <h2 id="modalTitle">Evento</h2>
        <div class="meta" id="modalMeta"></div>
        <p id="modalDesc"></p>
        <div id="modalRewards"></div>
        <div class="actions">
          <button class="btn-ghost" id="btnCloseModal">Fechar</button>
          <button class="btn-primary" id="btnParticipate">Participar</button>
        </div>
      </div>
    </div>

    <div class="action-screen" id="actionScreen">
      <div id="particleField"></div>
      <div class="action-ui">
        <div class="panel">
          <h2 style="margin:0;font-family:'Bebas Neue';font-size:2rem;letter-spacing:.08em" id="actionTitle">Ação</h2>
          <div class="meta" id="actionMeta"></div>
          <div class="phase-text" id="phaseText">A preparar operação...</div>
          <div style="display:grid;gap:8px;margin-top:10px">
            <div class="progress"><i id="progressFill"></i></div>
            <div style="display:flex;justify-content:space-between;font-size:.86rem;color:var(--muted)">
              <span id="progressTime">00:00</span>
              <span id="twistInfo">Twist: por revelar...</span>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="hud-grid">
            <div class="stat"><b>HP</b><span id="liveHp">100</span></div>
            <div class="stat"><b>TENSÃO</b><span id="liveStress">0</span></div>
            <div class="stat"><b>RISCO</b><span id="liveRisk">-</span></div>
            <div class="stat"><b>TEMPO RESTANTE</b><span id="liveTimer">--</span></div>
          </div>
        </div>

        <div class="panel" id="resultPanel" style="display:none">
          <h2 style="margin:0 0 8px;font-family:'Bebas Neue';letter-spacing:.08em">Resultado Final</h2>
          <div class="result" id="resultData"></div>
          <div class="actions" style="justify-content:flex-start">
            <button class="btn-primary" id="btnBackMap">Voltar ao Mapa</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CITY_W = 2000
    const CITY_H = 1400
    const EVENT_SEED = 7
    const BASE_MAP_IMAGE_URL = './map-reference.png'

    const EVENT_TYPES = {
      shootout: {
        name: 'Tiroteio em rua',
        icon: '🔫',
        danger: 'Alto',
        riskClass: 'high',
        duration: [15, 30],
        zones: ['gueto', 'industrial', 'abandonada'],
        desc: 'Facções rivais trocaram fogo numa artéria principal.',
      },
      bankHeist: {
        name: 'Assalto ao banco',
        icon: '🏦',
        danger: 'Muito alto',
        riskClass: 'very-high',
        duration: [180, 300],
        zones: ['comercial', 'rico'],
        desc: 'Grupo armado tomou o banco central e exige rota de fuga.',
      },
      drugDeal: {
        name: 'Tráfico de droga',
        icon: '💊',
        danger: 'Médio',
        riskClass: 'medium',
        duration: [45, 120],
        zones: ['mercado-negro', 'porto', 'gueto'],
        desc: 'Movimento suspeito de carga e distribuição clandestina.',
      },
      policeChase: {
        name: 'Perseguição policial',
        icon: '🚓',
        danger: 'Alto',
        riskClass: 'high',
        duration: [30, 60],
        zones: ['suburbio', 'residencial', 'comercial'],
        desc: 'Uma viatura em alta velocidade atravessa quarteirões lotados.',
      },
      vehicleTheft: {
        name: 'Roubo de viatura',
        icon: '🚗',
        danger: 'Médio',
        riskClass: 'medium',
        duration: [20, 40],
        zones: ['residencial', 'suburbio', 'rico'],
        desc: 'Gangue especializada está a levar carros por encomenda.',
      },
      gangWar: {
        name: 'Gang war',
        icon: '⚔️',
        danger: 'Muito alto',
        riskClass: 'very-high',
        duration: [120, 240],
        zones: ['gueto', 'industrial', 'abandonada'],
        desc: 'Território em disputa total entre duas crews pesadas.',
      },
    }

    const STATIC_CITY_NAME = 'Nizzia City'

    const ZONE_GRID_LAYOUT = [
      { id: 'zone_0', key: 'residencial', label: 'Residencial', color: '#8a946f', density: 0.45, col: 6, row: 4, cw: 4, rh: 3, reveal: 0.88, districtName: 'North Residencial' },
      { id: 'zone_1', key: 'comercial', label: 'Comercial', color: '#8f8d79', density: 0.62, col: 9, row: 3, cw: 4, rh: 3, reveal: 0.94, districtName: 'Central Comercial' },
      { id: 'zone_2', key: 'industrial', label: 'Industrial', color: '#9a9287', density: 0.56, col: 12, row: 6, cw: 4, rh: 3, reveal: 0.9, districtName: 'East Industrial' },
      { id: 'zone_3', key: 'porto', label: 'Porto/Docas', color: '#859384', density: 0.5, col: 14, row: 8, cw: 4, rh: 3, reveal: 0.86, districtName: 'South Docks' },
      { id: 'zone_4', key: 'suburbio', label: 'Subúrbio', color: '#82986b', density: 0.36, col: 3, row: 6, cw: 5, rh: 3, reveal: 0.82, districtName: 'West Suburbio' },
      { id: 'zone_5', key: 'gueto', label: 'Gueto', color: '#8d846f', density: 0.67, col: 8, row: 7, cw: 3, rh: 2, reveal: 0.76, districtName: 'Old Gueto' },
      { id: 'zone_6', key: 'rico', label: 'Bairro Rico', color: '#8f9d79', density: 0.48, col: 11, row: 2, cw: 3, rh: 2, reveal: 0.92, districtName: 'North Heights' },
      { id: 'zone_7', key: 'abandonada', label: 'Zona Abandonada', color: '#8a8a86', density: 0.2, col: 2, row: 9, cw: 4, rh: 3, reveal: 0.64, districtName: 'Derelict Belt' },
      { id: 'zone_8', key: 'parque', label: 'Parque', color: '#6e8f62', density: 0.15, col: 5, row: 2, cw: 4, rh: 2, reveal: 0.8, districtName: 'Green Park' },
      { id: 'zone_9', key: 'mercado-negro', label: 'Mercado Negro', color: '#8f8b75', density: 0.58, col: 9, row: 9, cw: 3, rh: 2, reveal: 0.72, districtName: 'Shadow Market' },
    ]

    const LOCATION_GRID_LAYOUT = [
      { key: 'bank', name: '🏦 Banco', col: 10, row: 4 },
      { key: 'hospital', name: '🏥 Hospital', col: 9, row: 6 },
      { key: 'prison', name: '⛓️ Prisão', col: 11, row: 9 },
      { key: 'gym', name: '💪 Gym', col: 8, row: 7 },
      { key: 'school', name: '🏫 Escola', col: 7, row: 6 },
      { key: 'shop', name: '🛒 Loja', col: 9, row: 5 },
      { key: 'casino', name: '🎰 Casino', col: 12, row: 4 },
      { key: 'warehouse', name: '📦 Armazém', col: 13, row: 8 },
      { key: 'harbor', name: '🚢 Porto Seco', col: 15, row: 9 },
      { key: 'club', name: '🎵 Clube Nocturno', col: 10, row: 8 },
      { key: 'factory', name: '🏭 Fábrica', col: 14, row: 7 },
    ]

    const DEFAULT_CITY_MAP_CONFIG = {
      imageUrl: BASE_MAP_IMAGE_URL,
      grid: {
        cols: 20,
        rows: 14,
        majorCols: 6,
        majorRows: 4,
        subDivisionFactor: 2,
        maxSubDivisions: 3,
      },
      zoom: {
        min: 1,
        max: 4,
        step: 0.25,
        initial: 1,
      },
      zones: ZONE_GRID_LAYOUT,
      locations: LOCATION_GRID_LAYOUT,
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)) }
    function fmtTime(seconds) {
      const s = Math.max(0, Math.floor(seconds))
      const m = Math.floor(s / 60)
      const r = s % 60
      return `${String(m).padStart(2, '0')}:${String(r).padStart(2, '0')}`
    }

    class RNG {
      constructor(seed) { this.seed = seed >>> 0 }
      next() {
        this.seed = (1664525 * this.seed + 1013904223) >>> 0
        return this.seed / 0x100000000
      }
      range(min, max) { return min + (max - min) * this.next() }
      int(min, max) { return Math.floor(this.range(min, max + 1)) }
      pick(arr) { return arr[this.int(0, arr.length - 1)] }
    }

    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj))
    }

    function normalizeCityMapConfig(input) {
      const raw = input && typeof input === 'object' ? input : {}
      const cfg = {
        imageUrl: typeof raw.imageUrl === 'string' && raw.imageUrl.trim() ? raw.imageUrl.trim() : DEFAULT_CITY_MAP_CONFIG.imageUrl,
        grid: {
          cols: Math.max(4, Number(raw.grid?.cols || DEFAULT_CITY_MAP_CONFIG.grid.cols)),
          rows: Math.max(4, Number(raw.grid?.rows || DEFAULT_CITY_MAP_CONFIG.grid.rows)),
          majorCols: Math.max(1, Number(raw.grid?.majorCols || DEFAULT_CITY_MAP_CONFIG.grid.majorCols)),
          majorRows: Math.max(1, Number(raw.grid?.majorRows || DEFAULT_CITY_MAP_CONFIG.grid.majorRows)),
          subDivisionFactor: Math.max(1, Number(raw.grid?.subDivisionFactor || DEFAULT_CITY_MAP_CONFIG.grid.subDivisionFactor)),
          maxSubDivisions: Math.max(1, Number(raw.grid?.maxSubDivisions || DEFAULT_CITY_MAP_CONFIG.grid.maxSubDivisions)),
        },
        zoom: {
          min: Math.max(0.25, Number(raw.zoom?.min || DEFAULT_CITY_MAP_CONFIG.zoom.min)),
          max: Math.max(0.5, Number(raw.zoom?.max || DEFAULT_CITY_MAP_CONFIG.zoom.max)),
          step: Math.max(0.05, Number(raw.zoom?.step || DEFAULT_CITY_MAP_CONFIG.zoom.step)),
          initial: Number(raw.zoom?.initial || DEFAULT_CITY_MAP_CONFIG.zoom.initial),
        },
        zones: Array.isArray(raw.zones) && raw.zones.length ? raw.zones : deepClone(DEFAULT_CITY_MAP_CONFIG.zones),
        locations: Array.isArray(raw.locations) && raw.locations.length ? raw.locations : deepClone(DEFAULT_CITY_MAP_CONFIG.locations),
      }
      if (cfg.zoom.max < cfg.zoom.min) cfg.zoom.max = cfg.zoom.min
      cfg.zoom.initial = clamp(cfg.zoom.initial, cfg.zoom.min, cfg.zoom.max)
      return cfg
    }

    function getGridMetrics() {
      const cols = Math.max(1, Number(state.mapConfig?.grid?.cols || DEFAULT_CITY_MAP_CONFIG.grid.cols))
      const rows = Math.max(1, Number(state.mapConfig?.grid?.rows || DEFAULT_CITY_MAP_CONFIG.grid.rows))
      return {
        cols,
        rows,
        cellW: CITY_W / cols,
        cellH: CITY_H / rows,
      }
    }

    function createStaticCity(mapConfig) {
      const cfg = normalizeCityMapConfig(mapConfig)
      const { cellW, cellH } = getGridMetrics()
      const zones = cfg.zones.map((z, index) => {
        const cw = Math.max(1, Number(z.cw || 1))
        const rh = Math.max(1, Number(z.rh || 1))
        const col = Math.max(0, Number(z.col || 0))
        const row = Math.max(0, Number(z.row || 0))
        const w = cw * cellW
        const h = rh * cellH
        return {
          id: z.id || `zone_${index}`,
          key: z.key || 'zona',
          label: z.label || 'Zona',
          color: z.color || '#8a946f',
          density: Number(z.density ?? 0.4),
          x: (col + cw * 0.5) * cellW,
          y: (row + rh * 0.5) * cellH,
          w,
          h,
          reveal: clamp(Number(z.reveal ?? 0.8), 0, 1),
          districtName: z.districtName || z.label || 'Zona',
        }
      })
      const locations = cfg.locations.map((loc) => ({
        key: loc.key,
        name: loc.name,
        x: (Number(loc.col || 0) + 0.5) * cellW,
        y: (Number(loc.row || 0) + 0.5) * cellH,
      }))
      return {
        cityName: STATIC_CITY_NAME,
        zones,
        roads: [],
        backdrop: {
          shoreline: [],
          islands: [],
          arterials: [],
          localRoads: [],
          districtBlobs: [],
          lakes: [],
          forestPatches: [],
          farmPatches: [],
          industrialArea: null,
          parcels: [],
          residentialBlocks: [],
        },
        locations,
      }
    }

    const state = {
      city: null,
      mapConfig: normalizeCityMapConfig(DEFAULT_CITY_MAP_CONFIG),
      baseMapImage: null,
      camera: {
        zoom: 1,
        minZoom: 1,
        maxZoom: 4,
        zoomStep: 0.25,
        cx: CITY_W / 2,
        cy: CITY_H / 2,
      },
      events: [],
      hover: { x: 0, y: 0 },
      selectedEventId: null,
      playerState: {
        hp: 100,
        money: 5000,
        xp: 0,
        stress: 0,
        status: 'livre',
        prisonUntil: null,
      },
      action: null,
      view: { x: 0, y: 0, w: CITY_W, h: CITY_H },
    }

    const canvas = document.getElementById('cityCanvas')
    const ctx = canvas.getContext('2d')
    const mini = document.getElementById('miniMap')
    const mctx = mini.getContext('2d')
    const eventLayer = document.getElementById('eventLayer')

    const cityMetaEl = document.getElementById('cityMeta')
    const legendListEl = document.getElementById('legendList')

    const hudMoney = document.getElementById('hudMoney')
    const hudXp = document.getElementById('hudXp')
    const hudStatus = document.getElementById('hudStatus')

    const modalMeta = document.getElementById('modalMeta')
    const modalDesc = document.getElementById('modalDesc')
    const modalRewards = document.getElementById('modalRewards')
    const btnCloseModal = document.getElementById('btnCloseModal')

    const actionMeta = document.getElementById('actionMeta')

    function resize() {
      const dpr = window.devicePixelRatio || 1
      const canvasW = canvas.clientWidth
      const canvasH = canvas.clientHeight
      canvas.width = Math.floor(canvasW * dpr)
      canvas.height = Math.floor(canvasH * dpr)
      canvas.style.width = `${canvasW}px`
      canvas.style.height = `${canvasH}px`
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0)

      const miniDpr = dpr
      mini.width = Math.floor(mini.clientWidth * miniDpr)
      mini.height = Math.floor(mini.clientHeight * miniDpr)
      mctx.setTransform(miniDpr, 0, 0, miniDpr, 0, 0)
    }

    function viewTransform() {
      const sx = canvas.clientWidth / CITY_W
      const sy = canvas.clientHeight / CITY_H
      const baseScale = Math.min(sx, sy)
      const zoom = clamp(state.camera.zoom, state.camera.minZoom, state.camera.maxZoom)
      const scale = baseScale * zoom
      const offsetX = canvas.clientWidth / 2 - state.camera.cx * scale
      const offsetY = canvas.clientHeight / 2 - state.camera.cy * scale
      return { scale, offsetX, offsetY }
    }

    function clampCamera() {
      state.camera.cx = clamp(state.camera.cx, 0, CITY_W)
      state.camera.cy = clamp(state.camera.cy, 0, CITY_H)
    }

    function setZoom(nextZoom, focusScreenX = canvas.clientWidth / 2, focusScreenY = canvas.clientHeight / 2) {
      const prev = viewTransform()
      const worldX = (focusScreenX - prev.offsetX) / prev.scale
      const worldY = (focusScreenY - prev.offsetY) / prev.scale
      const z = clamp(nextZoom, state.camera.minZoom, state.camera.maxZoom)
      state.camera.zoom = z

      const next = viewTransform()
      state.camera.cx = worldX + (canvas.clientWidth / 2 - focusScreenX) / next.scale
      state.camera.cy = worldY + (canvas.clientHeight / 2 - focusScreenY) / next.scale
      clampCamera()
    }

    function worldToScreen(x, y) {
      const { scale, offsetX, offsetY } = viewTransform()
      return { x: offsetX + x * scale, y: offsetY + y * scale, scale }
    }

    function screenToWorld(x, y) {
      const { scale, offsetX, offsetY } = viewTransform()
      return { x: (x - offsetX) / scale, y: (y - offsetY) / scale }
    }

    function pickZoneForPoint(x, y) {
      return state.city.zones.find((z) => Math.abs(x - z.x) <= z.w * 0.5 && Math.abs(y - z.y) <= z.h * 0.5)
    }

    function drawMap() {
      ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight)
      const { scale, offsetX, offsetY } = viewTransform()

      ctx.save()
      ctx.translate(offsetX, offsetY)
      ctx.scale(scale, scale)

      ctx.fillStyle = '#7d9b63'
      ctx.fillRect(0, 0, CITY_W, CITY_H)

      if (state.baseMapImage) {
        ctx.save()
        ctx.globalAlpha = 0.42
        ctx.drawImage(state.baseMapImage, 0, 0, CITY_W, CITY_H)
        ctx.restore()
      }

      drawGridOverlay(ctx)

      for (const patch of state.city.backdrop.forestPatches) {
        ctx.fillStyle = `rgba(46, 84, 42, ${patch.a})`
        ctx.beginPath()
        ctx.arc(patch.x, patch.y, patch.r, 0, Math.PI * 2)
        ctx.fill()
      }

      for (const farm of state.city.backdrop.farmPatches) {
        ctx.save()
        ctx.translate(farm.x, farm.y)
        ctx.rotate(farm.rot)
        ctx.fillStyle = farm.tone === 0
          ? 'rgba(170, 168, 98, 0.30)'
          : farm.tone === 1
            ? 'rgba(149, 140, 87, 0.27)'
            : farm.tone === 2
              ? 'rgba(118, 143, 82, 0.26)'
              : 'rgba(138, 156, 94, 0.24)'
        ctx.fillRect(-farm.w / 2, -farm.h / 2, farm.w, farm.h)
        ctx.strokeStyle = 'rgba(95, 104, 62, 0.25)'
        ctx.lineWidth = 0.8
        ctx.strokeRect(-farm.w / 2, -farm.h / 2, farm.w, farm.h)
        ctx.restore()
      }

      const shore = state.city.backdrop.shoreline
      if (shore.length) {
        ctx.strokeStyle = 'rgba(196, 189, 144, 0.7)'
        ctx.lineWidth = 10
        ctx.beginPath()
        ctx.moveTo(shore[0].x, shore[0].y)
        for (let i = 1; i < shore.length; i += 1) ctx.lineTo(shore[i].x, shore[i].y)
        ctx.stroke()

        ctx.strokeStyle = 'rgba(83, 107, 151, 0.32)'
        ctx.lineWidth = 4
        ctx.beginPath()
        ctx.moveTo(shore[0].x, shore[0].y + 6)
        for (let i = 1; i < shore.length; i += 1) ctx.lineTo(shore[i].x, shore[i].y + 6)
        ctx.stroke()
      }

      for (const lake of state.city.backdrop.lakes) {
        ctx.save()
        ctx.translate(lake.x, lake.y)
        ctx.rotate(lake.rot)
        ctx.fillStyle = 'rgba(219, 205, 150, 0.65)'
        ctx.beginPath()
        ctx.ellipse(0, 0, lake.rx + 18, lake.ry + 16, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = 'rgba(63, 182, 204, 0.88)'
        ctx.beginPath()
        ctx.ellipse(0, 0, lake.rx, lake.ry, 0, 0, Math.PI * 2)
        ctx.fill()
        ctx.restore()
      }

      ctx.fillStyle = 'rgba(185, 186, 192, 0.4)'
      for (const island of state.city.backdrop.islands) {
        ctx.beginPath()
        ctx.ellipse(island.x, island.y, island.r * 1.3, island.r, 0.2, 0, Math.PI * 2)
        ctx.fill()
      }

      for (const blob of state.city.backdrop.districtBlobs) {
        ctx.globalAlpha = 0.24
        ctx.fillStyle = blob.color
        ctx.beginPath()
        ctx.moveTo(blob.points[0].x, blob.points[0].y)
        for (let i = 1; i < blob.points.length; i += 1) {
          const p = blob.points[i]
          ctx.lineTo(p.x, p.y)
        }
        ctx.closePath()
        ctx.fill()
      }

      for (const parcel of state.city.backdrop.parcels) {
        ctx.save()
        ctx.translate(parcel.x, parcel.y)
        ctx.rotate(parcel.rot)
        ctx.fillStyle = 'rgba(185, 180, 170, 0.28)'
        ctx.fillRect(-parcel.w * 0.5, -parcel.h * 0.5, parcel.w, parcel.h)
        ctx.strokeStyle = 'rgba(85, 86, 78, 0.26)'
        ctx.lineWidth = 0.7
        ctx.strokeRect(-parcel.w * 0.5, -parcel.h * 0.5, parcel.w, parcel.h)
        ctx.restore()
      }

      for (const block of state.city.backdrop.residentialBlocks) {
        ctx.save()
        ctx.translate(block.x, block.y)
        ctx.rotate(block.rot)
        ctx.fillStyle = block.t === 0
          ? 'rgba(168, 164, 154, 0.34)'
          : block.t === 1
            ? 'rgba(152, 150, 141, 0.31)'
            : 'rgba(134, 132, 125, 0.29)'
        ctx.fillRect(-block.w * 0.5, -block.h * 0.5, block.w, block.h)
        ctx.restore()
      }

      const ia = state.city.backdrop.industrialArea
      if (ia) {
        ctx.fillStyle = 'rgba(196, 194, 186, 0.78)'
        roundRect(ctx, ia.x, ia.y, ia.w, ia.h, 8, true, false)
        for (let gy = ia.y + 10; gy < ia.y + ia.h - 10; gy += 28) {
          for (let gx = ia.x + 10; gx < ia.x + ia.w - 10; gx += 40) {
            ctx.fillStyle = 'rgba(160, 162, 158, 0.92)'
            ctx.fillRect(gx, gy, 28, 18)
            ctx.strokeStyle = 'rgba(120, 122, 118, 0.7)'
            ctx.strokeRect(gx, gy, 28, 18)
          }
        }
      }

      for (const z of state.city.zones) {
        ctx.globalAlpha = 1
        ctx.fillStyle = 'rgba(50,52,46,0.7)'
        ctx.font = '10px "Share Tech Mono"'
        ctx.fillText(z.districtName, z.x - z.w / 2 + 8, z.y - z.h / 2 + 18)
      }

      for (const loc of state.city.locations) {
        ctx.fillStyle = 'rgba(0,0,0,.46)'
        ctx.beginPath()
        ctx.arc(loc.x, loc.y, 13, 0, Math.PI * 2)
        ctx.fill()

        ctx.fillStyle = '#f3c34f'
        ctx.beginPath()
        ctx.moveTo(loc.x, loc.y - 12)
        ctx.bezierCurveTo(loc.x + 9, loc.y - 12, loc.x + 10, loc.y + 2, loc.x, loc.y + 14)
        ctx.bezierCurveTo(loc.x - 10, loc.y + 2, loc.x - 9, loc.y - 12, loc.x, loc.y - 12)
        ctx.fill()

        ctx.fillStyle = '#1b1b1b'
        ctx.font = '10px "Share Tech Mono"'
        ctx.fillText(loc.name, loc.x + 14, loc.y + 3)
      }

      drawFogOfWar(ctx)

      ctx.restore()

      drawMinimap()
      drawEventChips()
      drawCursorHUD()
    }

    function drawFogOfWar(g) {
      for (const z of state.city.zones) {
        const areaX = z.x - z.w / 2
        const areaY = z.y - z.h / 2
        const reveal = z.reveal
        if (reveal > 0.72) continue

        const alpha = reveal > 0.35 ? 0.36 : 0.66
        const grad = g.createRadialGradient(z.x, z.y, 20, z.x, z.y, Math.max(z.w, z.h) * 0.6)
        grad.addColorStop(0, `rgba(5,8,15,${alpha * 0.4})`)
        grad.addColorStop(1, `rgba(3,5,11,${alpha})`)
        g.fillStyle = grad
        roundRect(g, areaX, areaY, z.w, z.h, 18, true, false)
      }
    }

    function drawMinimap() {
      const w = mini.clientWidth
      const h = mini.clientHeight
      mctx.clearRect(0, 0, w, h)
      mctx.fillStyle = '#07101b'
      mctx.fillRect(0, 0, w, h)
      const sx = w / CITY_W
      const sy = h / CITY_H
      for (const z of state.city.zones) {
        mctx.fillStyle = z.color
        mctx.globalAlpha = 0.84
        mctx.fillRect((z.x - z.w / 2) * sx, (z.y - z.h / 2) * sy, z.w * sx, z.h * sy)
      }
      mctx.globalAlpha = 1
      for (const e of state.events) {
        mctx.fillStyle = '#ff5b74'
        mctx.beginPath()
        mctx.arc(e.x * sx, e.y * sy, 3, 0, Math.PI * 2)
        mctx.fill()
      }

      mctx.strokeStyle = 'rgba(75,209,255,.88)'
      mctx.strokeRect(1, 1, w - 2, h - 2)
    }

    function drawEventChips() {
      eventLayer.innerHTML = ''
      if (state.playerState.status === 'em_evento') return
      for (const e of state.events) {
        const p = worldToScreen(e.x, e.y)
        const chip = document.createElement('button')
        chip.className = `event-chip ${e.template.riskClass}`
        chip.style.left = `${p.x}px`
        chip.style.top = `${p.y}px`
        chip.textContent = fmtTime(e.remaining)
        chip.title = `${e.template.name} · ${e.zone.label}`
        chip.onclick = () => openEventModal(e.id)
        eventLayer.appendChild(chip)
      }
    }

    function drawCursorHUD() {
      const { x, y } = state.hover
      const zone = pickZoneForPoint(x, y)
      const cfg = state.mapConfig.grid || DEFAULT_CITY_MAP_CONFIG.grid
      const zoom = state.camera.zoom
      const subLevel = Math.min(
        Number(cfg.maxSubDivisions || 1),
        Math.max(1, Math.floor((zoom - 1) / 0.75) + 1)
      )
      const factor = Math.pow(Number(cfg.subDivisionFactor || 2), Math.max(0, subLevel - 1))
      const cols = Math.max(1, Number(cfg.majorCols || 6) * factor)
      const rows = Math.max(1, Number(cfg.majorRows || 4) * factor)
      const cellW = CITY_W / cols
      const cellH = CITY_H / rows
      const col = clamp(Math.floor(x / cellW), 0, cols - 1)
      const row = clamp(Math.floor(y / cellH), 0, rows - 1)
      cityMetaEl.textContent = `COORD ${Math.round(x)},${Math.round(y)} · GRID L${subLevel} ${col},${row}${zone ? ` · ${zone.label}` : ''}`
    }

    function drawGridOverlay(g) {
      const cfg = state.mapConfig.grid || DEFAULT_CITY_MAP_CONFIG.grid
      const zoom = state.camera.zoom
      const subLevel = Math.min(
        Number(cfg.maxSubDivisions || 1),
        Math.max(1, Math.floor((zoom - 1) / 0.75) + 1)
      )
      const factor = Math.pow(Number(cfg.subDivisionFactor || 2), Math.max(0, subLevel - 1))
      const cols = Math.max(1, Number(cfg.majorCols || 6) * factor)
      const rows = Math.max(1, Number(cfg.majorRows || 4) * factor)
      const cellW = CITY_W / cols
      const cellH = CITY_H / rows

      g.save()
      g.strokeStyle = 'rgba(42, 48, 42, 0.28)'
      g.lineWidth = 1
      for (let c = 1; c < cols; c += 1) {
        const x = c * cellW
        g.beginPath()
        g.moveTo(x, 0)
        g.lineTo(x, CITY_H)
        g.stroke()
      }
      for (let r = 1; r < rows; r += 1) {
        const y = r * cellH
        g.beginPath()
        g.moveTo(0, y)
        g.lineTo(CITY_W, y)
        g.stroke()
      }
      g.restore()
    }

    function loadBaseMapImage(src) {
      return new Promise((resolve) => {
        const img = new Image()
        img.onload = () => resolve(img)
        img.onerror = () => resolve(null)
        img.src = src
      })
    }

    async function loadCityMapConfig() {
      try {
        const res = await fetch('/api/world/city-map/config', { cache: 'no-store' })
        if (!res.ok) throw new Error('fetch_failed')
        const data = await res.json()
        return normalizeCityMapConfig(data?.cityMap)
      } catch (error) {
        return normalizeCityMapConfig(DEFAULT_CITY_MAP_CONFIG)
      }
    }

    function roundRect(g, x, y, w, h, r, fill, stroke) {
      g.beginPath()
      g.moveTo(x + r, y)
      g.lineTo(x + w - r, y)
      g.quadraticCurveTo(x + w, y, x + w, y + r)
      g.lineTo(x + w, y + h - r)
      g.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
      g.lineTo(x + r, y + h)
      g.quadraticCurveTo(x, y + h, x, y + h - r)
      g.lineTo(x, y + r)
      g.quadraticCurveTo(x, y, x + r, y)
      if (fill) g.fill()
      if (stroke) g.stroke()
    }

    function buildLegend() {
      const keyItems = [
        { label: 'Água', color: '#4ea7bd' },
        { label: 'Floresta', color: '#557f4c' },
        { label: 'Agrícola', color: '#9b9c5f' },
        { label: 'Industrial', color: '#9b978f' },
        { label: 'Rodovia', color: '#8d8d8d' },
        { label: 'Evento ativo', color: '#b47b4d' },
      ]
      legendListEl.innerHTML = ''
      for (const item of keyItems) {
        const li = document.createElement('li')
        li.innerHTML = `<span class="dot" style="background:${item.color}"></span><span>${item.label}</span>`
        legendListEl.appendChild(li)
      }
    }

    function updateHUD() {
      hudHp.textContent = Math.round(state.playerState.hp)
      hudMoney.textContent = `$${Math.round(state.playerState.money)}`
      hudXp.textContent = Math.round(state.playerState.xp)
      hudStatus.textContent = state.playerState.status.toUpperCase()
      statusLock.classList.toggle('show', state.playerState.status === 'em_evento')
    }

    function weightedEventType(zoneKey, rng) {
      const entries = Object.entries(EVENT_TYPES)
      const scored = entries.map(([k, v]) => {
        let score = 1
        if (v.zones.includes(zoneKey)) score += 3
        return [k, score]
      })
      const total = scored.reduce((a, [, s]) => a + s, 0)
      let pick = rng.range(0, total)
      for (const [k, s] of scored) {
        pick -= s
        if (pick <= 0) return k
      }
      return scored[0][0]
    }

    function regenerateEvents() {
      const rng = new RNG(EVENT_SEED * 73129 + Date.now())
      const count = 9 + rng.int(0, 6)
      const events = []
      for (let i = 0; i < count; i += 1) {
        const zone = rng.pick(state.city.zones)
        const typeKey = weightedEventType(zone.key, rng)
        const tpl = EVENT_TYPES[typeKey]
        const duration = rng.int(tpl.duration[0], tpl.duration[1])
        const e = {
          id: `ev_${Date.now()}_${i}_${rng.int(1000, 9999)}`,
          typeKey,
          template: tpl,
          zone,
          x: clamp(zone.x + rng.range(-zone.w * 0.35, zone.w * 0.35), 40, CITY_W - 40),
          y: clamp(zone.y + rng.range(-zone.h * 0.35, zone.h * 0.35), 40, CITY_H - 40),
          duration,
          remaining: duration,
          reward: {
            money: rng.int(500, 12000),
            xp: rng.int(20, 220),
            rep: rng.int(1, 8),
            item: rng.pick(['Munições raras', 'Colete tático', 'Chave mestra', 'Nada', 'Documento falso']),
          },
        }
        events.push(e)
      }
      state.events = events
    }

    let selectedEvent = null

    function openEventModal(eventId) {
      if (state.playerState.status !== 'livre') return
      selectedEvent = state.events.find((e) => e.id === eventId)
      if (!selectedEvent) return
      modalTitle.textContent = `${selectedEvent.template.icon} ${selectedEvent.template.name}`
      modalMeta.innerHTML = `
        <span>Zona: ${selectedEvent.zone.label}</span>
        <span>Perigo: ${selectedEvent.template.danger}</span>
        <span>Duração: ${fmtTime(selectedEvent.remaining)}</span>
      `
      modalDesc.textContent = selectedEvent.template.desc
      modalRewards.innerHTML = `<strong>Recompensas possíveis:</strong> $${selectedEvent.reward.money} · XP ${selectedEvent.reward.xp} · REP ${selectedEvent.reward.rep} · Item: ${selectedEvent.reward.item}`
      eventModalOverlay.classList.add('show')
    }

    function closeEventModal() {
      eventModalOverlay.classList.remove('show')
    }

    function computeOutcome(eventObj, actionState) {
      const rng = new RNG(Date.now() + EVENT_SEED * 91)
      const riskBase = actionState.riskFactor
      const hpFactor = state.playerState.hp / 100
      const stressFactor = clamp(1 - state.playerState.stress / 120, 0.2, 1)
      let chance = 0.68 * hpFactor * stressFactor - riskBase
      if (actionState.twist && actionState.twist.effect === 'good') chance += 0.16
      if (actionState.twist && actionState.twist.effect === 'bad') chance -= 0.2
      chance = clamp(chance, 0.08, 0.93)

      const roll = rng.next()
      let status = 'success'
      if (roll > chance) status = rng.next() < 0.35 ? 'captured' : 'failed'

      const hpLoss = status === 'success' ? rng.int(0, 18) : rng.int(8, 36)
      const moneyDelta = status === 'success' ? eventObj.reward.money : -rng.int(200, 3000)
      const xpDelta = status === 'success' ? eventObj.reward.xp : rng.int(0, 28)
      const repDelta = status === 'success' ? eventObj.reward.rep : -rng.int(0, 2)

      return {
        status,
        hpLoss,
        moneyDelta,
        xpDelta,
        repDelta,
        item: status === 'success' ? eventObj.reward.item : null,
      }
    }

    function beginAction(eventObj) {
      state.playerState.status = 'em_evento'
      updateHUD()
      closeEventModal()

      actionScreen.classList.add('show')
      resultPanel.style.display = 'none'
      resultData.innerHTML = ''

      actionTitle.textContent = `${eventObj.template.icon} ${eventObj.template.name}`
      actionMeta.innerHTML = `<span>Zona: ${eventObj.zone.label}</span><span>Perigo: ${eventObj.template.danger}</span>`
      liveRisk.textContent = eventObj.template.danger

      const rng = new RNG(Date.now() + eventObj.duration)
      const total = eventObj.remaining
      const twistAt = Math.floor(total * rng.range(0.45, 0.62))
      const phases = [
        `Entraste na zona ${eventObj.zone.label}. O ambiente está tenso e cada movimento conta.`,
        'Aproximas-te do alvo com cautela. Há câmaras, vigias e ruído de sirenes ao longe.',
        'Fase crítica: qualquer erro agora muda tudo. Decides avançar mesmo com a pressão máxima.',
        'Último sprint. Estás a tentar sair limpo antes do cerco fechar.',
      ]
      const twists = [
        { text: 'A polícia chegou mais cedo!', effect: 'bad' },
        { text: 'Um aliado apareceu para cobrir a fuga!', effect: 'good' },
        { text: 'Houve blackout no quarteirão, confusão total.', effect: 'neutral' },
        { text: 'O líder rival entrou na cena inesperadamente.', effect: 'bad' },
      ]

      state.action = {
        eventId: eventObj.id,
        startedAt: performance.now(),
        total,
        remaining: total,
        twistAt,
        twist: null,
        phaseIndex: 0,
        phases,
        twistPool: twists,
        riskFactor: eventObj.template.danger === 'Muito alto' ? 0.25 : eventObj.template.danger === 'Alto' ? 0.15 : 0.08,
        finished: false,
      }
      phaseText.textContent = phases[0]
      twistInfo.textContent = 'Twist: por revelar...'
      spawnParticles()
    }

    function spawnParticles() {
      const field = document.getElementById('particleField')
      field.innerHTML = ''
      for (let i = 0; i < 70; i += 1) {
        const p = document.createElement('i')
        p.className = 'particle'
        p.style.left = `${Math.random() * 100}%`
        p.style.bottom = `${-10 - Math.random() * 60}px`
        p.style.animationDuration = `${4 + Math.random() * 8}s`
        p.style.animationDelay = `${Math.random() * 4}s`
        p.style.opacity = `${0.2 + Math.random() * 0.6}`
        p.style.background = Math.random() > 0.6 ? 'rgba(255,79,165,.8)' : 'rgba(75,209,255,.8)'
        field.appendChild(p)
      }
    }

    function tickAction(deltaSec) {
      if (!state.action || state.action.finished) return
      const a = state.action
      a.remaining = clamp(a.remaining - deltaSec, 0, a.total)
      const elapsed = a.total - a.remaining

      if (!a.twist && elapsed >= a.twistAt) {
        const rng = new RNG(Date.now() + elapsed)
        a.twist = rng.pick(a.twistPool)
        twistInfo.textContent = `Twist: ${a.twist.text}`
        phaseText.textContent = `${phaseText.textContent}\n\n⚡ ${a.twist.text}`
        state.playerState.stress = clamp(state.playerState.stress + (a.twist.effect === 'bad' ? 20 : a.twist.effect === 'good' ? -8 : 6), 0, 130)
      }

      const phaseStep = Math.floor((elapsed / a.total) * a.phases.length)
      if (phaseStep !== a.phaseIndex && phaseStep < a.phases.length) {
        a.phaseIndex = phaseStep
        phaseText.textContent = a.phases[phaseStep]
      }

      if (Math.random() > 0.55) {
        state.playerState.stress = clamp(state.playerState.stress + (a.riskFactor * 4), 0, 130)
      }

      const progress = ((a.total - a.remaining) / a.total) * 100
      progressFill.style.width = `${progress.toFixed(2)}%`
      progressTime.textContent = `Restante: ${fmtTime(a.remaining)}`
      liveTimer.textContent = fmtTime(a.remaining)
      liveStress.textContent = Math.round(state.playerState.stress)
      liveHp.textContent = Math.round(state.playerState.hp)

      if (a.remaining <= 0) {
        a.finished = true
        const ev = state.events.find((e) => e.id === a.eventId)
        const outcome = computeOutcome(ev, a)
        applyOutcome(outcome)
        renderResult(ev, outcome)
      }
    }

    function applyOutcome(outcome) {
      state.playerState.hp = clamp(state.playerState.hp - outcome.hpLoss, 0, 100)
      state.playerState.money = Math.max(0, state.playerState.money + outcome.moneyDelta)
      state.playerState.xp = Math.max(0, state.playerState.xp + outcome.xpDelta)

      if (outcome.status === 'captured') {
        state.playerState.status = 'preso'
        state.playerState.prisonUntil = Date.now() + 45_000
      } else {
        state.playerState.status = 'livre'
      }

      updateHUD()
    }

    function renderResult(ev, outcome) {
      const success = outcome.status === 'success'
      const captured = outcome.status === 'captured'
      const label = success ? '✅ Sucesso' : captured ? '⛓️ Capturado' : '❌ Falha'

      resultData.innerHTML = `
        <div><strong>Estado:</strong> ${label}</div>
        <div><strong>Dinheiro:</strong> ${outcome.moneyDelta >= 0 ? '+' : ''}$${outcome.moneyDelta}</div>
        <div><strong>XP:</strong> ${outcome.xpDelta >= 0 ? '+' : ''}${outcome.xpDelta}</div>
        <div><strong>Reputação:</strong> ${outcome.repDelta >= 0 ? '+' : ''}${outcome.repDelta}</div>
        <div><strong>HP perdido:</strong> ${outcome.hpLoss}</div>
        <div><strong>Item:</strong> ${outcome.item || 'Nenhum'}</div>
        <div><strong>Narrativa:</strong> ${captured ? 'A operação foi comprometida e foste redirecionado para a prisão.' : success ? 'Execução limpa. Conseguiste sair com ganhos.' : 'A operação falhou sem colapso total.'}</div>
      `
      resultPanel.style.display = 'block'

      state.events = state.events.filter((e) => e.id !== ev.id)
    }

    function leaveActionScreen() {
      actionScreen.classList.remove('show')
      state.action = null
      if (state.playerState.status === 'preso') {
        // preso sem mapa bloqueado total, mas sem entrar em eventos até soltar
        setTimeout(() => {
          if (state.playerState.prisonUntil && Date.now() >= state.playerState.prisonUntil) {
            state.playerState.status = 'livre'
            state.playerState.prisonUntil = null
            updateHUD()
          }
        }, 100)
      }
      updateHUD()
    }

    function tickGlobalTimers(deltaSec) {
      for (const e of state.events) {
        e.remaining = Math.max(0, e.remaining - deltaSec)
      }
      state.events = state.events.filter((e) => e.remaining > 0)

      if (state.playerState.status === 'preso' && state.playerState.prisonUntil && Date.now() >= state.playerState.prisonUntil) {
        state.playerState.status = 'livre'
        state.playerState.prisonUntil = null
      }
    }

    btnCloseModal.addEventListener('click', closeEventModal)
    btnParticipate.addEventListener('click', () => {
      if (!selectedEvent) return
      if (state.playerState.status === 'preso') {
        alert('Estás preso e não podes participar até seres libertado.')
        return
      }
      beginAction(selectedEvent)
    })
    btnBackMap.addEventListener('click', leaveActionScreen)

    canvas.addEventListener('mousemove', (ev) => {
      const rect = canvas.getBoundingClientRect()
      const world = screenToWorld(ev.clientX - rect.left, ev.clientY - rect.top)
      state.hover.x = clamp(world.x, 0, CITY_W)
      state.hover.y = clamp(world.y, 0, CITY_H)
    })

    canvas.addEventListener('click', () => {
      if (state.playerState.status === 'em_evento') return
      closeEventModal()
    })

    canvas.addEventListener('wheel', (ev) => {
      ev.preventDefault()
      const rect = canvas.getBoundingClientRect()
      const x = ev.clientX - rect.left
      const y = ev.clientY - rect.top
      const dir = ev.deltaY < 0 ? 1 : -1
      setZoom(state.camera.zoom + dir * state.camera.zoomStep, x, y)
    }, { passive: false })

    btnZoomIn?.addEventListener('click', () => {
      setZoom(state.camera.zoom + state.camera.zoomStep)
    })
    btnZoomOut?.addEventListener('click', () => {
      setZoom(state.camera.zoom - state.camera.zoomStep)
    })

    window.addEventListener('resize', resize)

    async function init() {
      state.mapConfig = await loadCityMapConfig()
      const zcfg = state.mapConfig.zoom || DEFAULT_CITY_MAP_CONFIG.zoom
      state.camera.minZoom = Math.max(0.25, Number(zcfg.min || 1))
      state.camera.maxZoom = Math.max(state.camera.minZoom, Number(zcfg.max || 4))
      state.camera.zoomStep = Math.max(0.05, Number(zcfg.step || 0.25))
      state.camera.zoom = clamp(Number(zcfg.initial || 1), state.camera.minZoom, state.camera.maxZoom)

      const imageUrl = state.mapConfig.imageUrl || BASE_MAP_IMAGE_URL
      state.baseMapImage = await loadBaseMapImage(imageUrl)
      state.city = createStaticCity(state.mapConfig)
      cityNameEl.textContent = state.city.cityName
      buildLegend()
      regenerateEvents()
      updateHUD()
      resize()
      requestAnimationFrame(loop)
    }

    let last = performance.now()
    let refreshAccumulator = 0
    function loop(now) {
      const delta = Math.min((now - last) / 1000, 0.1)
      last = now

      refreshAccumulator += delta
      if (refreshAccumulator > 1) {
        tickGlobalTimers(refreshAccumulator)
        refreshAccumulator = 0
      }

      if (state.playerState.status === 'em_evento') {
        tickAction(delta)
      }

      if (state.events.length < 5 && state.playerState.status !== 'em_evento') {
        regenerateEvents()
      }

      drawMap()
      requestAnimationFrame(loop)
    }

    init().catch((error) => {
      console.error('Falha ao inicializar mapa:', error)
    })
    window.regenerateEvents = regenerateEvents
  </script>
</body>
</html>
