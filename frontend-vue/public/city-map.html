<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torn - City Event Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --frame: #1a1a1a;
      --panel: rgba(34, 34, 34, 0.95);
      --panel-border: #484848;
      --text: #f3f3f3;
      --muted: #adadad;
      --shadow: 0 12px 26px rgba(0, 0, 0, 0.6);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at 20% 10%, #161616 0%, #070707 70%);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      padding: 0;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 0;
      overflow: hidden;
      box-shadow: none;
      background: #111;
    }

    .map-shell {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 1fr;
      background: #111;
    }

    .map-stage {
      position: relative;
      height: 100%;
      overflow: hidden;
      background: #181818;
      border-bottom: 1px solid #2f2f2f;
    }

    #cityCanvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }

    #eventLayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 18;
    }

    #locationLayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 16;
      display: none;
    }

    .hud {
      position: absolute;
      top: 10px;
      left: 10px;
      display: grid;
      gap: 8px;
      z-index: 20;
      max-width: calc(100% - 64px);
    }

    .panel {
      background: rgba(20, 24, 20, 0.7);
      border: 1px solid rgba(210, 220, 200, 0.17);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 8px 10px;
    }

    .title {
      margin: 0;
      line-height: 1;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.45rem;
      letter-spacing: 0.08em;
    }

    .subtitle { color: var(--muted); font-size: 0.8rem; letter-spacing: 0.05em; margin-top: 4px; }

    .hud-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(94px, 1fr));
      gap: 8px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 6px;
      min-width: 86px;
    }

    .stat b {
      display: block;
      font-size: 0.62rem;
      color: #b4b4b4;
      margin-bottom: 1px;
    }

    .stat span { font-size: 0.86rem; }

    .mini-wrap {
      position: absolute;
      left: 10px;
      bottom: 10px;
      width: 210px;
      z-index: 20;
      display: none;
    }

    #miniMap {
      width: 100%;
      height: 120px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(0, 0, 0, 0.55);
    }

    .map-tools {
      position: absolute;
      right: 10px;
      top: 12px;
      z-index: 22;
      display: none;
    }

    .tool-btn {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #3c3c3c, #161616);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: .9rem;
      cursor: pointer;
    }

    .event-chip {
      position: absolute;
      z-index: 15;
      transform: translate(-50%, -100%);
      color: #e8eef8;
      font-size: 0.64rem;
      text-align: center;
      min-width: 92px;
      padding: 5px 8px;
      border-radius: 14px 14px 14px 4px;
      background: linear-gradient(180deg, rgba(23, 30, 46, 0.95), rgba(13, 18, 31, 0.95));
      border: 1px solid rgba(146, 202, 255, 0.4);
      box-shadow: 0 2px 10px rgba(0,0,0,.45), 0 0 0 1px rgba(73, 130, 186, 0.25) inset;
      animation: pulse 1.6s infinite;
      cursor: pointer;
      user-select: none;
      pointer-events: auto;
      font-weight: 600;
      line-height: 1.15;
    }

    .event-chip::after {
      content: '';
      position: absolute;
      left: 12px;
      bottom: -9px;
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 9px solid #1e2f4c;
    }

    .event-chip .chip-top {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
    }

    .event-chip .chip-zone {
      display: block;
      margin-top: 2px;
      font-size: 0.56rem;
      color: #9eb3cb;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .event-chip.medium { border-color: rgba(118, 219, 161, 0.56); box-shadow: 0 2px 10px rgba(0,0,0,.45), 0 0 16px rgba(66, 177, 116, 0.35); }
    .event-chip.medium::after { border-top-color: #20573f; }
    .event-chip.high { border-color: rgba(255, 188, 108, 0.55); box-shadow: 0 2px 10px rgba(0,0,0,.45), 0 0 16px rgba(217, 127, 54, 0.36); }
    .event-chip.high::after { border-top-color: #7e4b25; }
    .event-chip.very-high { border-color: rgba(255, 123, 123, 0.6); box-shadow: 0 2px 10px rgba(0,0,0,.45), 0 0 18px rgba(216, 79, 79, 0.38); }
    .event-chip.very-high::after { border-top-color: #7a2c30; }

    .event-chip.late {
      animation: none;
      background: linear-gradient(180deg, rgba(49, 49, 49, 0.92), rgba(28, 28, 28, 0.92));
      border-color: rgba(168, 168, 168, 0.35);
      color: #c6c6c6;
      cursor: default;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      filter: grayscale(0.35);
    }

    .event-chip.late::after {
      border-top-color: #545454;
    }

    .event-chip.late .chip-zone {
      color: #8f8f8f;
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -100%) scale(1); }
      50% { transform: translate(-50%, -101%) scale(1.06); }
      100% { transform: translate(-50%, -100%) scale(1); }
    }


    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 40;
      background: rgba(3, 7, 14, 0.72);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .overlay.show { display: flex; }

    .modal {
      width: min(700px, 100%);
      background: linear-gradient(160deg, rgba(29, 29, 29, 0.97), rgba(10, 10, 10, 0.97));
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .modal h2 {
      margin: 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: .08em;
    }

    .modal .meta {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .actions { margin-top: 14px; display: flex; gap: 10px; justify-content: flex-end; }

    button {
      font: inherit;
      border: none;
      border-radius: 8px;
      padding: 9px 13px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: .03em;
    }

    .btn-primary { background: linear-gradient(120deg, #f3c854, #de8d2c); color: #1f1708; }
    .btn-ghost { background: rgba(255,255,255,.08); color: var(--text); border: 1px solid rgba(255,255,255,.15); }

    .action-screen {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      background:
        radial-gradient(70% 50% at 40% 20%, rgba(64, 89, 138, 0.36), rgba(0, 0, 0, 0)),
        radial-gradient(80% 60% at 80% 90%, rgba(105, 47, 47, 0.3), rgba(0, 0, 0, 0)),
        linear-gradient(180deg, #050505, #111);
      overflow: hidden;
    }

    .action-screen.show { display: block; }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(240, 199, 76, .82);
      animation: drift linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0); opacity: .8; }
      to { transform: translateY(-120vh); opacity: 0; }
    }

    .action-ui {
      position: relative;
      z-index: 3;
      max-width: 920px;
      margin: 24px auto;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .phase-text {
      min-height: 90px;
      font-size: 1.02rem;
      line-height: 1.5;
      border-left: 4px solid #e3ae43;
      padding-left: 12px;
      background: rgba(5, 5, 5, 0.5);
    }

    .progress {
      height: 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.15);
      overflow: hidden;
    }

    .progress > i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f0b847, #d35a40);
      transition: width .18s linear;
    }

    .result {
      display: grid;
      gap: 8px;
      font-size: 0.95rem;
      background: rgba(5, 5, 5, 0.5);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px;
      padding: 12px;
    }

    .status-lock { display: none !important; }

    @media (max-width: 980px) {
      #app { height: 100vh; width: 100vw; }
      .hud-grid { grid-template-columns: repeat(2, minmax(94px, 1fr)); }
      .mini-wrap { width: 170px; }
      #miniMap { height: 96px; }
      .map-shell { grid-template-rows: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="map-shell">
      <div class="map-stage">
        <canvas id="cityCanvas"></canvas>
        <div id="eventLayer"></div>

          <div class="hud">
            <div class="panel">
              <div class="subtitle" id="cityMeta">COORD 0,0</div>
              <div class="subtitle" id="locationInfo">LOCAL -</div>
            </div>
          </div>

          <div class="mini-wrap panel">
            <canvas id="miniMap"></canvas>
          </div>

        <div class="status-lock" id="statusLock">EM OPERAÇÃO · MAPA BLOQUEADO</div>
      </div>
    </div>

    <div class="overlay" id="eventModalOverlay">
      <div class="modal">
        <h2 id="modalTitle">Evento</h2>
        <div class="meta" id="modalMeta"></div>
        <p id="modalDesc"></p>
        <div id="modalRewards"></div>
        <div class="actions">
          <button class="btn-ghost" id="btnCloseModal">Fechar</button>
          <button class="btn-primary" id="btnParticipate">Participar</button>
        </div>
      </div>
    </div>

    <div class="action-screen" id="actionScreen">
      <div id="particleField"></div>
      <div class="action-ui">
        <div class="panel">
          <h2 style="margin:0;font-family:'Bebas Neue';font-size:2rem;letter-spacing:.08em" id="actionTitle">Ação</h2>
          <div class="meta" id="actionMeta"></div>
          <div class="phase-text" id="phaseText">A preparar operação...</div>
          <div style="display:grid;gap:8px;margin-top:10px">
            <div class="progress"><i id="progressFill"></i></div>
            <div style="display:flex;justify-content:space-between;font-size:.86rem;color:var(--muted)">
              <span id="progressTime">00:00</span>
              <span id="twistInfo">Twist: por revelar...</span>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="hud-grid">
            <div class="stat"><b>HP</b><span id="liveHp">100</span></div>
            <div class="stat"><b>TENSÃO</b><span id="liveStress">0</span></div>
            <div class="stat"><b>RISCO</b><span id="liveRisk">-</span></div>
            <div class="stat"><b>TEMPO RESTANTE</b><span id="liveTimer">--</span></div>
          </div>
        </div>

        <div class="panel" id="resultPanel" style="display:none">
          <h2 style="margin:0 0 8px;font-family:'Bebas Neue';letter-spacing:.08em">Resultado Final</h2>
          <div class="result" id="resultData"></div>
          <div class="actions" style="justify-content:flex-start">
            <button class="btn-primary" id="btnBackMap">Voltar ao Mapa</button>
          </div>
        </div>
      </div>
    </div>
  </div>

    function fmtTime(seconds) {

    class RNG {
      constructor(seed) { this.seed = seed >>> 0 }
      next() {
        this.seed = (1664525 * this.seed + 1013904223) >>> 0
        return this.seed / 0x100000000
      }
      range(min, max) { return min + (max - min) * this.next() }
      int(min, max) { return Math.floor(this.range(min, max + 1)) }
      pick(arr) { return arr[this.int(0, arr.length - 1)] }
    }

      const rawTypes = mapConfig?.events?.types

      const out = {}
      rawTypes.forEach((entry, idx) => {
        const key = String(entry?.key || `event_${idx + 1}`).trim()
        if (!key) return
        const durationRange = Array.isArray(entry?.durationRange) ? entry.durationRange : entry?.duration
        const reward = entry?.reward && typeof entry.reward === 'object' ? entry.reward : entry?.rewards
        out[key] = {
          name: String(entry?.name || key),
          icon: String(entry?.icon || '⚡'),
          danger: String(entry?.danger || 'Médio'),
          riskClass: String(entry?.riskClass || 'medium'),
          mode: entry?.mode === 'group' ? 'group' : 'solo',
          duration: Array.isArray(durationRange) ? durationRange : [120, 240],
          participationDuration: Math.max(10, Number(entry?.participationDuration || 90)),
          zones: Array.isArray(entry?.zones) ? entry.zones.map((z) => String(z || '').trim()).filter(Boolean) : [],
          desc: String(entry?.desc || ''),
          rewards: {
            money: Array.isArray(reward?.money) ? reward.money : [500, 1500],
            xp: Array.isArray(reward?.xp) ? reward.xp : [20, 80],
            rep: Array.isArray(reward?.rep) ? reward.rep : [1, 4],
            items: Array.isArray(reward?.items) ? reward.items : ['Nenhum'],
          },
          phases: Array.isArray(entry?.phases) ? entry.phases : [],
          twists: Array.isArray(entry?.twists) ? entry.twists : [],
        }
      })

      return Object.keys(out).length ? out : deepClone(EVENT_TYPES)

    function resize() {
      const dpr = window.devicePixelRatio || 1
      const canvasW = canvas.clientWidth
      const canvasH = canvas.clientHeight
      canvas.width = Math.floor(canvasW * dpr)
      canvas.height = Math.floor(canvasH * dpr)
      canvas.style.width = `${canvasW}px`
      canvas.style.height = `${canvasH}px`
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0)

    }

    function viewTransform() {
      const sx = canvas.clientWidth / CITY_W
      const sy = canvas.clientHeight / CITY_H
      const baseScale = Math.max(sx, sy)
      const zoom = clamp(state.camera.zoom, state.camera.minZoom, state.camera.maxZoom)
      const scale = baseScale * zoom
      const offsetX = canvas.clientWidth / 2 - state.camera.cx * scale
      const offsetY = canvas.clientHeight / 2 - state.camera.cy * scale
      return { scale, offsetX, offsetY }
    }

    function clampCamera() {
      state.camera.cx = clamp(state.camera.cx, 0, CITY_W)
      state.camera.cy = clamp(state.camera.cy, 0, CITY_H)
    }

    function setZoom(nextZoom, focusScreenX = canvas.clientWidth / 2, focusScreenY = canvas.clientHeight / 2) {
      const prev = viewTransform()
      const worldX = (focusScreenX - prev.offsetX) / prev.scale
      const worldY = (focusScreenY - prev.offsetY) / prev.scale
      const z = clamp(nextZoom, state.camera.minZoom, state.camera.maxZoom)
      state.camera.zoom = z

      const next = viewTransform()
      state.camera.cx = worldX + (canvas.clientWidth / 2 - focusScreenX) / next.scale
      state.camera.cy = worldY + (canvas.clientHeight / 2 - focusScreenY) / next.scale
      clampCamera()
    }

    function worldToScreen(x, y) {
      const { scale, offsetX, offsetY } = viewTransform()
      return { x: offsetX + x * scale, y: offsetY + y * scale, scale }
    }

    function screenToWorld(x, y) {
      const { scale, offsetX, offsetY } = viewTransform()
      return { x: (x - offsetX) / scale, y: (y - offsetY) / scale }
    }

    function pickZoneForPoint(x, y) {
      return state.city.zones.find((z) => Math.abs(x - z.x) <= z.w * 0.5 && Math.abs(y - z.y) <= z.h * 0.5)
    }

    function drawMap() {
      ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight)
      const { scale, offsetX, offsetY } = viewTransform()

      ctx.save()
      ctx.translate(offsetX, offsetY)
      ctx.scale(scale, scale)

      ctx.fillStyle = '#0f1116'
      ctx.fillRect(0, 0, CITY_W, CITY_H)

      if (state.baseMapImage) {
        ctx.save()
        ctx.globalAlpha = 1
        ctx.drawImage(state.baseMapImage, 0, 0, CITY_W, CITY_H)
        ctx.restore()
      }

      ctx.restore()
      drawEventChips()
      drawCursorHUD()
    }

    function drawFogOfWar(g) {
      for (const z of state.city.zones) {
        const areaX = z.x - z.w / 2
        const areaY = z.y - z.h / 2
        const reveal = z.reveal
        if (reveal > 0.72) continue

        const alpha = reveal > 0.35 ? 0.36 : 0.66
        const grad = g.createRadialGradient(z.x, z.y, 20, z.x, z.y, Math.max(z.w, z.h) * 0.6)
        grad.addColorStop(0, `rgba(5,8,15,${alpha * 0.4})`)
        grad.addColorStop(1, `rgba(3,5,11,${alpha})`)
        g.fillStyle = grad
        roundRect(g, areaX, areaY, z.w, z.h, 18, true, false)
      }
    }

      eventLayer.innerHTML = ''
      if (state.playerState.status === 'em_evento') return
      const nowMs = Date.now()
      for (const e of state.events) {
        refreshEventRuntimeState(e, nowMs)
        if (e.state === 'expired') continue
        const p = worldToScreen(e.x, e.y)
        const chip = document.createElement('button')
        chip.className = `event-chip ${e.template.riskClass}${e.joinable ? '' : ' late'}`
        chip.style.left = `${p.x}px`
        chip.style.top = `${p.y}px`
        chip.innerHTML = `<span class="chip-top">${e.template.icon} ${fmtTime(e.remaining)}</span><span class="chip-zone">${e.zone.label}</span>`
        chip.title = `${e.template.name} · ${e.zone.label} · ${eventStateLabel(e)}`
        if (e.joinable) {
          chip.onclick = () => openEventModal(e.id)
        } else {
          chip.disabled = true

        eventLayer.appendChild(chip)

    function drawCursorHUD() {
      const { x, y } = state.hover
      const zone = pickZoneForPoint(x, y)
      const cfg = state.mapConfig.grid || DEFAULT_CITY_MAP_CONFIG.grid
      const zoom = state.camera.zoom
      const subLevel = Math.min(
        Number(cfg.maxSubDivisions || 1),
        Math.max(1, Math.floor((zoom - 1) / 0.75) + 1)
      )
      const factor = Math.pow(Number(cfg.subDivisionFactor || 2), Math.max(0, subLevel - 1))
      const cols = Math.max(1, Number(cfg.majorCols || 6) * factor)
      const rows = Math.max(1, Number(cfg.majorRows || 4) * factor)
      const cellW = CITY_W / cols
      const cellH = CITY_H / rows
      const col = clamp(Math.floor(x / cellW), 0, cols - 1)
      const row = clamp(Math.floor(y / cellH), 0, rows - 1)
      cityMetaEl.textContent = `COORD ${Math.round(x)},${Math.round(y)} · GRID L${subLevel} ${col},${row}${zone ? ` · ${zone.label}` : ''}`

      let nearest = null
      let nearestDistance = Number.POSITIVE_INFINITY
      for (const loc of state.city.locations) {
        const distance = Math.hypot(loc.x - x, loc.y - y)
        if (distance < nearestDistance) {
          nearestDistance = distance
          nearest = loc
        }
      }

      if (locationInfoEl) {
        locationInfoEl.textContent = nearest
          ? `LOCAL ${nearest.name} · DIST ${Math.round(nearestDistance)}m`
          : 'LOCAL -'
      }
    }

    function drawGridOverlay(g) {
      const cfg = state.mapConfig.grid || DEFAULT_CITY_MAP_CONFIG.grid

      const subLevel = Math.min(
        Number(cfg.maxSubDivisions || 1),
        Math.max(1, Math.floor((zoom - 1) / 0.75) + 1)
      )
      const factor = Math.pow(Number(cfg.subDivisionFactor || 2), Math.max(0, subLevel - 1))
      const cols = Math.max(1, Number(cfg.majorCols || 6) * factor)
      const rows = Math.max(1, Number(cfg.majorRows || 4) * factor)
      const cellW = CITY_W / cols
      const cellH = CITY_H / rows

      g.save()
      g.strokeStyle = 'rgba(42, 48, 42, 0.28)'
      g.lineWidth = 1
      for (let c = 1; c < cols; c += 1) {
        const x = c * cellW
        g.beginPath()
        g.moveTo(x, 0)
        g.lineTo(x, CITY_H)
        g.stroke()
      }
      for (let r = 1; r < rows; r += 1) {
        const y = r * cellH
        g.beginPath()
        g.moveTo(0, y)
        g.lineTo(CITY_W, y)
        g.stroke()
      }
      g.restore()
    }

    function roundRect(g, x, y, w, h, r, fill, stroke) {
      g.beginPath()
      g.moveTo(x + r, y)
      g.lineTo(x + w - r, y)
      g.quadraticCurveTo(x + w, y, x + w, y + r)
      g.lineTo(x + w, y + h - r)
      g.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
      g.lineTo(x + r, y + h)
      g.quadraticCurveTo(x, y + h, x, y + h - r)
      g.lineTo(x, y + r)
      g.quadraticCurveTo(x, y, x + r, y)
      if (fill) g.fill()
      if (stroke) g.stroke()
    }

    function weightedEventType(zoneKey, rng) {
      const entries = Object.entries(state.eventTypes || EVENT_TYPES)
      if (!entries.length) {
        const defaults = Object.keys(EVENT_TYPES)
        return defaults.length ? defaults[0] : null
      }
      const scored = entries.map(([k, v]) => {
        let score = 1
        if (v.zones.includes(zoneKey)) score += 3
        return [k, score]
      })
      const total = scored.reduce((a, [, s]) => a + s, 0)
      let pick = rng.range(0, total)
      for (const [k, s] of scored) {
        pick -= s
        if (pick <= 0) return k
      }
      return scored[0]?.[0] || null
    }

    function randomInRange(range, rng) {
      const [min, max] = Array.isArray(range) ? range : [0, 0]
      return rng.int(Number(min || 0), Number(max || 0))
    }

    function normalizeDurationSec(value, fallback) {
      const n = Number(value)
      if (!Number.isFinite(n) || n <= 0) return fallback
      return Math.round(n)
    }

    function resolveZoneForEvent(entry, rng) {
      const zoneKey = String(entry?.zoneKey || entry?.zone || '').trim()
      const byKey = zoneKey ? state.city.zones.find((z) => z.key === zoneKey || z.id === zoneKey) : null
      if (byKey) return byKey

      const x = Number(entry?.x)
      const y = Number(entry?.y)
      if (Number.isFinite(x) && Number.isFinite(y)) {
        const picked = pickZoneForPoint(x, y)
        if (picked) return picked
      }

      return rng.pick(state.city.zones)
    }

    function parseStartedAtMs(value) {
      if (typeof value === 'number' && Number.isFinite(value)) {
        return value > 1e12 ? value : value * 1000
      }
      if (typeof value === 'string') {
        const ms = Date.parse(value)
        if (Number.isFinite(ms)) return ms
      }
      return Date.now()
    }

          items: ['Nenhum'],
        },
        phases: Array.isArray(entry?.phases) ? entry.phases : [],
        twists: Array.isArray(entry?.twists) ? entry.twists : [],
      }

      const zone = resolveZoneForEvent(entry, rng)
      const duration = normalizeDurationSec(entry?.duration, randomInRange(template.duration, rng))
      const participationDuration = normalizeDurationSec(entry?.participationDuration, template.participationDuration || Math.floor(duration * 0.45))
      const startedAt = parseStartedAtMs(entry?.startedAt)
      const x = Number.isFinite(Number(entry?.x)) ? clamp(Number(entry.x), 40, CITY_W - 40) : clamp(zone.x + rng.range(-zone.w * 0.35, zone.w * 0.35), 40, CITY_W - 40)
      const y = Number.isFinite(Number(entry?.y)) ? clamp(Number(entry.y), 40, CITY_H - 40) : clamp(zone.y + rng.range(-zone.h * 0.35, zone.h * 0.35), 40, CITY_H - 40)

      const rewardCfg = template.rewards || { money: [500, 1200], xp: [20, 80], rep: [1, 3], items: ['Nenhum'] }
      const reward = {
        money: normalizeDurationSec(entry?.reward?.money, randomInRange(rewardCfg.money, rng)),
        xp: normalizeDurationSec(entry?.reward?.xp, randomInRange(rewardCfg.xp, rng)),
        rep: normalizeDurationSec(entry?.reward?.rep, randomInRange(rewardCfg.rep, rng)),
        item: typeof entry?.reward?.item === 'string' ? entry.reward.item : rng.pick(rewardCfg.items || ['Nenhum']),
      }

      return {
        id: String(entry?.id || `ev_${Date.now()}_${rng.int(1000, 9999)}`),
        typeKey: typeKey || template.name.toLowerCase().replace(/\s+/g, '_'),
        template,
        zone,
        x,
        y,
        startedAt,
        duration,
        participationDuration,
        mode: entry?.mode === 'group' ? 'group' : entry?.mode === 'solo' ? 'solo' : (template.mode || 'solo'),
        locked: Boolean(entry?.locked),
        completed: Boolean(entry?.completed),
        reward,
        remaining: duration,
        joinable: false,
        state: 'running',
      }
    }

    function refreshEventRuntimeState(ev, nowMs = Date.now()) {
      const elapsedSec = Math.max(0, (nowMs - ev.startedAt) / 1000)
      ev.remaining = Math.max(0, ev.duration - elapsedSec)

      if (ev.completed) {
        ev.joinable = false
        ev.state = 'completed'
        return ev
      }
      if (ev.remaining <= 0) {
        ev.joinable = false
        ev.state = 'expired'
        return ev
      }

      const participationGate = ev.participationDuration * 2
      const windowOpen = ev.remaining >= participationGate
      const modeOpen = ev.mode === 'group' || !ev.locked
      ev.joinable = windowOpen && modeOpen && state.playerState.status === 'livre'
      ev.state = ev.joinable ? 'running' : 'late'
      return ev
    }

    function eventStateLabel(ev) {
      if (ev.state === 'expired') return 'Expirado'
      if (ev.state === 'completed') return 'Concluído'
      if (ev.state === 'late') return 'Tarde demais'
      return 'A decorrer'
    }

    async function fetchEventsFromApi() {
      const res = await fetch(`/api/city/${MAP_SEED}/events`, { cache: 'no-store' })
      if (!res.ok) throw new Error('events_fetch_failed')
      const data = await res.json()
      const list = Array.isArray(data?.events) ? data.events : []
      const rng = new RNG(EVENT_SEED * 991 + Date.now())
      const normalized = list
        .map((entry) => normalizeEventEntry(entry, rng))
        .filter(Boolean)
      if (!normalized.length) throw new Error('events_empty')
      state.eventsSource = 'api'
      state.events = normalized
      state.lastEventFetchAt = Date.now()
    }

    function regenerateEvents() {
      const rng = new RNG(MAP_SEED * 73129 + Date.now())
      const maxActive = Math.max(1, Number(state.mapConfig?.events?.maxActiveEvents || 12))
      const count = Math.max(4, maxActive - 2) + rng.int(0, 2)
      const zones = Array.isArray(state.city?.zones) && state.city.zones.length
        ? state.city.zones
        : Array.isArray(DEFAULT_CITY_MAP_CONFIG?.zones)
          ? createStaticCity(DEFAULT_CITY_MAP_CONFIG).zones
          : []
      const typeCatalog = state.eventTypes && Object.keys(state.eventTypes).length
        ? state.eventTypes
        : EVENT_TYPES

      if (!zones.length || !Object.keys(typeCatalog).length) {
        state.eventsSource = 'fallback'
        state.events = []
        state.lastEventFetchAt = Date.now()
        return
      }

      const events = []
      for (let i = 0; i < count; i += 1) {
        const zone = rng.pick(zones)
        if (!zone) continue
        const typeKey = weightedEventType(zone.key, rng)
        const tpl = typeCatalog[typeKey] || typeCatalog[Object.keys(typeCatalog)[0]]
        if (!tpl) continue
        const duration = randomInRange(tpl.duration, rng)
        const participationDuration = Number(tpl.participationDuration || Math.floor(duration * 0.45))
        const startedAt = Date.now() - rng.int(0, Math.floor(duration * 0.7)) * 1000
        const rewards = tpl.rewards || { money: [500, 1000], xp: [20, 80], rep: [1, 3], items: ['Nenhum'] }
        const e = {
          id: `ev_${Date.now()}_${i}_${rng.int(1000, 9999)}`,
          typeKey,
          template: tpl,
          zone,
          x: clamp(zone.x + rng.range(-zone.w * 0.35, zone.w * 0.35), 40, CITY_W - 40),
          y: clamp(zone.y + rng.range(-zone.h * 0.35, zone.h * 0.35), 40, CITY_H - 40),
          startedAt,
          duration,
          participationDuration,
          mode: tpl.mode || 'solo',
          locked: false,
          completed: false,
          remaining: duration,
          joinable: false,
          state: 'running',
          reward: {
            money: randomInRange(rewards.money, rng),
            xp: randomInRange(rewards.xp, rng),
            rep: randomInRange(rewards.rep, rng),
            item: rng.pick(rewards.items || ['Nenhum']),
          },
        }
        refreshEventRuntimeState(e)
        events.push(e)
      }
      state.eventsSource = 'fallback'
      state.events = events
      state.lastEventFetchAt = Date.now()
    }

    function ensureEventSeed() {
      if (!state.city || !Array.isArray(state.city.zones) || !state.city.zones.length) {
        state.city = createStaticCity(DEFAULT_CITY_MAP_CONFIG)
      }
      if (!state.eventTypes || !Object.keys(state.eventTypes).length) {
        state.eventTypes = deepClone(EVENT_TYPES)
      }
      if (!state.events.length) {
        regenerateEvents()
      }
    }

    let selectedEvent = null

    function openEventModal(eventId) {
      if (state.playerState.status !== 'livre') return
      selectedEvent = state.events.find((e) => e.id === eventId)
      if (!selectedEvent) return
      refreshEventRuntimeState(selectedEvent)
      if (!selectedEvent.joinable) return
      modalTitle.textContent = `${selectedEvent.template.icon} ${selectedEvent.template.name}`
      modalMeta.innerHTML = `
        <span>Zona: ${selectedEvent.zone.label}</span>
        <span>Perigo: ${selectedEvent.template.danger}</span>
        <span>Modo: ${selectedEvent.mode === 'group' ? 'Grupo' : 'Solo'}</span>
        <span>Estado: ${eventStateLabel(selectedEvent)}</span>
        <span>Janela: ${fmtTime(selectedEvent.remaining)} restantes</span>
        <span>Participação: ${fmtTime(selectedEvent.participationDuration)}</span>
      `
      modalDesc.textContent = selectedEvent.template.desc
      modalRewards.innerHTML = `<strong>Recompensas possíveis:</strong> $${selectedEvent.reward.money} · XP ${selectedEvent.reward.xp} · REP ${selectedEvent.reward.rep} · Item: ${selectedEvent.reward.item}`
      btnParticipate.disabled = !selectedEvent.joinable
      btnParticipate.textContent = selectedEvent.joinable ? 'Participar' : 'Tarde demais'
      eventModalOverlay.classList.add('show')
    }

    function closeEventModal() {
      btnParticipate.disabled = false
      btnParticipate.textContent = 'Participar'
      eventModalOverlay.classList.remove('show')
    }

    function computeOutcome(eventObj, actionState) {
      const rng = new RNG(Date.now() + EVENT_SEED * 91)
      const riskBase = actionState.riskFactor
      const hpFactor = state.playerState.hp / 100
      const stressFactor = clamp(1 - state.playerState.stress / 120, 0.2, 1)
      let chance = 0.68 * hpFactor * stressFactor - riskBase
      if (actionState.twist && actionState.twist.effect === 'good') chance += 0.16
      if (actionState.twist && actionState.twist.effect === 'bad') chance -= 0.2
      chance = clamp(chance, 0.08, 0.93)

      const roll = rng.next()
      let status = 'success'
      if (roll > chance) {
        if (rng.next() < 0.28) status = 'captured'
        else if (rng.next() < 0.45) status = 'no_effect'
        else status = 'failed'
      }

      const hpLoss = status === 'success' ? rng.int(0, 18) : status === 'captured' ? rng.int(15, 38) : rng.int(2, 20)
      const moneyDelta = status === 'success' ? eventObj.reward.money : status === 'failed' ? -rng.int(200, 3000) : 0
      const xpDelta = status === 'success' ? eventObj.reward.xp : status === 'failed' ? rng.int(0, 28) : 0
      const repDelta = status === 'success' ? eventObj.reward.rep : status === 'failed' ? -rng.int(0, 2) : 0

      return {
        status,
        hpLoss,
        moneyDelta,
        xpDelta,
        repDelta,
        item: status === 'success' ? eventObj.reward.item : null,
      }
    }

    function beginAction(eventObj) {
      refreshEventRuntimeState(eventObj)
      if (!eventObj.joinable) {
        closeEventModal()
        return
      }

      if (eventObj.mode === 'solo') {
        eventObj.locked = true
      }

      state.playerState.status = 'em_evento'
      updateHUD()
      closeEventModal()

      actionScreen.classList.add('show')
      resultPanel.style.display = 'none'
      resultData.innerHTML = ''

      actionTitle.textContent = `${eventObj.template.icon} ${eventObj.template.name}`
      actionMeta.innerHTML = `<span>Zona: ${eventObj.zone.label}</span><span>Perigo: ${eventObj.template.danger}</span><span>Modo: ${eventObj.mode === 'group' ? 'Grupo' : 'Solo'}</span>`
      liveRisk.textContent = eventObj.template.danger

      const rng = new RNG(Date.now() + eventObj.duration)
      const total = Math.max(30, Math.min(eventObj.participationDuration, eventObj.remaining))
      const twistAt = Math.floor(total * rng.range(0.45, 0.62))
      const phases = Array.isArray(eventObj.template.phases) && eventObj.template.phases.length
        ? eventObj.template.phases
        : [
            `Entraste na zona ${eventObj.zone.label}. O ambiente está tenso e cada movimento conta.`,
            'Aproximas-te do alvo com cautela. Há câmaras, vigias e ruído de sirenes ao longe.',
            'Fase crítica: qualquer erro agora muda tudo. Decides avançar mesmo com a pressão máxima.',
            'Último sprint. Estás a tentar sair limpo antes do cerco fechar.',
          ]
      const twists = Array.isArray(eventObj.template.twists) && eventObj.template.twists.length
        ? eventObj.template.twists
        : [
            { text: 'A polícia chegou mais cedo!', effect: 'bad' },
            { text: 'Um aliado apareceu para cobrir a fuga!', effect: 'good' },
            { text: 'Houve blackout no quarteirão, confusão total.', effect: 'neutral' },
            { text: 'O líder rival entrou na cena inesperadamente.', effect: 'bad' },
          ]

      state.action = {
        eventId: eventObj.id,
        startedAt: performance.now(),
        total,
        remaining: total,
        twistAt,
        twist: null,
        phaseIndex: 0,
        phases,
        twistPool: twists,
        riskFactor: eventObj.template.danger === 'Muito alto' ? 0.25 : eventObj.template.danger === 'Alto' ? 0.15 : 0.08,
        finished: false,
      }
      phaseText.textContent = phases[0]
      twistInfo.textContent = 'Twist: por revelar...'
      spawnParticles()
    }

    function spawnParticles() {
      const field = document.getElementById('particleField')
      field.innerHTML = ''
      for (let i = 0; i < 70; i += 1) {
        const p = document.createElement('i')
        p.className = 'particle'
        p.style.left = `${Math.random() * 100}%`
        p.style.bottom = `${-10 - Math.random() * 60}px`
        p.style.animationDuration = `${4 + Math.random() * 8}s`
        p.style.animationDelay = `${Math.random() * 4}s`
        p.style.opacity = `${0.2 + Math.random() * 0.6}`
        p.style.background = Math.random() > 0.6 ? 'rgba(255,79,165,.8)' : 'rgba(75,209,255,.8)'
        field.appendChild(p)
      }
    }

    function tickAction(deltaSec) {
      if (!state.action || state.action.finished) return
      const a = state.action
      a.remaining = clamp(a.remaining - deltaSec, 0, a.total)
      const elapsed = a.total - a.remaining

      if (!a.twist && elapsed >= a.twistAt) {
        const rng = new RNG(Date.now() + elapsed)
        a.twist = rng.pick(a.twistPool)
        twistInfo.textContent = `Twist: ${a.twist.text}`
        phaseText.textContent = `${phaseText.textContent}\n\n⚡ ${a.twist.text}`
        state.playerState.stress = clamp(state.playerState.stress + (a.twist.effect === 'bad' ? 20 : a.twist.effect === 'good' ? -8 : 6), 0, 130)
      }

      const phaseStep = Math.floor((elapsed / a.total) * a.phases.length)
      if (phaseStep !== a.phaseIndex && phaseStep < a.phases.length) {
        a.phaseIndex = phaseStep
        phaseText.textContent = a.phases[phaseStep]
      }

      if (Math.random() > 0.55) {
        state.playerState.stress = clamp(state.playerState.stress + (a.riskFactor * 4), 0, 130)
      }

      const progress = ((a.total - a.remaining) / a.total) * 100
      progressFill.style.width = `${progress.toFixed(2)}%`
      progressTime.textContent = `Restante: ${fmtTime(a.remaining)}`
      liveTimer.textContent = fmtTime(a.remaining)
      liveStress.textContent = Math.round(state.playerState.stress)
      liveHp.textContent = Math.round(state.playerState.hp)

      if (a.remaining <= 0) {
        a.finished = true
        const ev = state.events.find((e) => e.id === a.eventId)
        const outcome = computeOutcome(ev, a)
        applyOutcome(outcome)
        renderResult(ev, outcome)
      }
    }

    function applyOutcome(outcome) {
      state.playerState.hp = clamp(state.playerState.hp - outcome.hpLoss, 0, 100)
      state.playerState.money = Math.max(0, state.playerState.money + outcome.moneyDelta)
      state.playerState.xp = Math.max(0, state.playerState.xp + outcome.xpDelta)

      if (outcome.status === 'captured') {
        state.playerState.status = 'preso'
        state.playerState.prisonUntil = Date.now() + 45_000
      } else {
        state.playerState.status = 'livre'
      }

      updateHUD()
    }

    function renderResult(ev, outcome) {
      const success = outcome.status === 'success'
      const captured = outcome.status === 'captured'
      const noEffect = outcome.status === 'no_effect'
      const label = success ? '✅ Sucesso' : captured ? '⛓️ Capturado' : noEffect ? '😶 Sem consequências' : '❌ Falha'

      resultData.innerHTML = `
        <div><strong>Estado:</strong> ${label}</div>
        <div><strong>Dinheiro:</strong> ${outcome.moneyDelta >= 0 ? '+' : ''}$${outcome.moneyDelta}</div>
        <div><strong>XP:</strong> ${outcome.xpDelta >= 0 ? '+' : ''}${outcome.xpDelta}</div>
        <div><strong>Reputação:</strong> ${outcome.repDelta >= 0 ? '+' : ''}${outcome.repDelta}</div>
        <div><strong>HP perdido:</strong> ${outcome.hpLoss}</div>
        <div><strong>Item:</strong> ${outcome.item || 'Nenhum'}</div>
        <div><strong>Narrativa:</strong> ${captured ? 'A operação foi comprometida e foste redirecionado para a prisão.' : success ? 'Execução limpa. Conseguiste sair com ganhos.' : noEffect ? 'A operação caiu por terra, mas saíste sem perdas relevantes.' : 'A operação falhou sem colapso total.'}</div>
      `
      resultPanel.style.display = 'block'

      ev.completed = true
      ev.state = 'completed'
      state.events = state.events.filter((e) => e.id !== ev.id)
    }

    function leaveActionScreen() {
      actionScreen.classList.remove('show')
      state.action = null
      if (state.playerState.status === 'preso') {
        if (window.top) {
          try { window.top.location.assign('/prison') } catch {}
        }
      }
      updateHUD()
    }

    function tickGlobalTimers(deltaSec) {
      const nowMs = Date.now()
      for (const e of state.events) refreshEventRuntimeState(e, nowMs)
      state.events = state.events.filter((e) => e.state !== 'expired' && e.state !== 'completed')

      if (state.playerState.status === 'preso' && state.playerState.prisonUntil && Date.now() >= state.playerState.prisonUntil) {
        state.playerState.status = 'livre'
        state.playerState.prisonUntil = null
      }
    }

    async function refreshEvents(force = false) {
      if (state.eventsLoading) return
      if (state.playerState.status === 'em_evento') return

      const stale = force || (Date.now() - state.lastEventFetchAt) >= state.eventRefreshSeconds * 1000
      if (!stale && state.events.length) return

      state.eventsLoading = true
      try {
        await fetchEventsFromApi()
      } catch (error) {
        try {
          regenerateEvents()
        } catch (fallbackError) {
          state.eventsSource = 'fallback'
          state.events = []
          state.lastEventFetchAt = Date.now()
        }
      } finally {
        if (!state.events.length) {
          try { ensureEventSeed() } catch {}
        }
        state.eventsLoading = false
      }
    }

    btnCloseModal.addEventListener('click', closeEventModal)
    btnParticipate.addEventListener('click', () => {
      if (!selectedEvent) return
      refreshEventRuntimeState(selectedEvent)
      if (!selectedEvent.joinable) return
      if (state.playerState.status === 'preso') {
        alert('Estás preso e não podes participar até seres libertado.')
        return
      }
      beginAction(selectedEvent)
    })
    btnBackMap.addEventListener('click', leaveActionScreen)

    canvas.addEventListener('mousemove', (ev) => {
      const rect = canvas.getBoundingClientRect()
      const world = screenToWorld(ev.clientX - rect.left, ev.clientY - rect.top)
      state.hover.x = clamp(world.x, 0, CITY_W)
      state.hover.y = clamp(world.y, 0, CITY_H)
    })

    canvas.addEventListener('click', () => {
      if (state.playerState.status === 'em_evento') return
      closeEventModal()
    })

    canvas.addEventListener('wheel', (ev) => {
      ev.preventDefault()
      const rect = canvas.getBoundingClientRect()
      const x = ev.clientX - rect.left
      const y = ev.clientY - rect.top
      const dir = ev.deltaY < 0 ? 1 : -1
      setZoom(state.camera.zoom + dir * state.camera.zoomStep, x, y)
    }, { passive: false })

    btnZoomIn?.addEventListener('click', () => {
      setZoom(state.camera.zoom + state.camera.zoomStep)
    })
    btnZoomOut?.addEventListener('click', () => {
      setZoom(state.camera.zoom - state.camera.zoomStep)
    })

    window.addEventListener('resize', resize)

    async function init() {
      state.mapConfig = await loadCityMapConfig()
      state.eventTypes = normalizeEventCatalog(state.mapConfig)
      state.eventRefreshSeconds = Math.max(5, Number(state.mapConfig?.events?.refreshIntervalSeconds || EVENT_REFRESH_SECONDS))
      const zcfg = state.mapConfig.zoom || DEFAULT_CITY_MAP_CONFIG.zoom
      state.camera.minZoom = Math.max(0.25, Number(zcfg.min || 1))
      state.camera.maxZoom = Math.max(state.camera.minZoom, Number(zcfg.max || 4))
      state.camera.zoomStep = Math.max(0.05, Number(zcfg.step || 0.25))
      state.camera.zoom = clamp(Number(zcfg.initial || 1), state.camera.minZoom, state.camera.maxZoom)

      const imageUrl = state.mapConfig.imageUrl || BASE_MAP_IMAGE_URL
      state.baseMapImage = await loadBaseMapImage(imageUrl)
      state.city = createStaticCity(state.mapConfig)
      await refreshEvents(true)
      ensureEventSeed()
      updateHUD()
      resize()
      requestAnimationFrame(loop)
    }

    let last = performance.now()
    let refreshAccumulator = 0
    function loop(now) {
      const delta = Math.min((now - last) / 1000, 0.1)
      last = now

      refreshAccumulator += delta
      if (refreshAccumulator > 1) {
        tickGlobalTimers(refreshAccumulator)
        refreshAccumulator = 0
      }

      if (state.playerState.status === 'em_evento') {
        tickAction(delta)
      }

      if (state.playerState.status !== 'em_evento' && (Date.now() - state.lastEventFetchAt >= state.eventRefreshSeconds * 1000 || state.events.length < 4)) {
        refreshEvents(false)
      }

      drawMap()
      requestAnimationFrame(loop)
    }

    init().catch((error) => {
      console.error('Falha ao inicializar mapa:', error)
    })
    window.__cityMapDebug = () => ({
      events: state.events.length,
      eventsSource: state.eventsSource,
      eventTypes: Object.keys(state.eventTypes || {}).length,
      zones: state.city?.zones?.length || 0,
      refreshSeconds: state.eventRefreshSeconds,
      status: state.playerState.status,
      sample: state.events.slice(0, 3).map((e) => ({ id: e.id, zone: e.zone?.key, state: e.state, remaining: Math.round(e.remaining || 0) })),
    })
    window.regenerateEvents = regenerateEvents
  </script>
</body>
</html>
